name: E2E Test
on:
  workflow_call:
    inputs:
      vite-evervault-js-url:
        description: "URL where the JS SDK should be loaded from"
        required: true
        type: string
      vite-keys-url:
        description: "URL where keys will be fetched from"
        required: true
        type: string
      vite-api-url:
        description: "API endpoint"
        required: true
        type: string
      run-code-coverage-checks:
        description: "Whether to run code coverage checks or not"
        required: true
        type: boolean
      update-screenshots:
        description: "Whether to update screenshots or not"
        required: true
        type: boolean
jobs:
  get-e2e-targets:
    name: "Build list of E2E test projects"
    runs-on: ubuntu-latest
    outputs:
      e2e-test-matrix: ${{ steps.e2e-targets.outputs.e2e-test-matrix }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build E2E matrix
        id: e2e-targets
        # Projects whose suites are short enough that the per-job setup
        # overhead outweighs the parallelism win from sharding. These run as a
        # single job with --shard=1/1 (a no-op in Playwright). Everything else
        # is split into 2 shards.
        env:
          UNSHARDED_PROJECTS: '["@evervault/browser-e2e-tests","@repo/crypto-harness-e2e-tests"]'
        run: |-
          E2E_PROJECTS=$(pnpm m ls --depth=1 --json | jq -cr '[.[] | select(.name|endswith("e2e-tests")) | .name]')
          MATRIX=$(jq -cn \
            --argjson projects "$E2E_PROJECTS" \
            --argjson unsharded "$UNSHARDED_PROJECTS" \
            '[$projects[] as $p |
              if ($unsharded | index($p)) then
                {project: $p, shard: 1, "total-shards": 1}
              else
                {project: $p, shard: 1, "total-shards": 2},
                {project: $p, shard: 2, "total-shards": 2}
              end
            ]')
          echo "e2e-test-matrix=$MATRIX" >> $GITHUB_OUTPUT
  build:
    name: "Build packages for E2E"
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ inputs.vite-api-url }}
      VITE_EVERVAULT_JS_URL: ${{ inputs.vite-evervault-js-url }}
      VITE_KEYS_URL: ${{ inputs.vite-keys-url }}
      VITE_GOOGLE_PAY_MERCHANT_ID: ${{ vars.GOOGLE_PAY_MERCHANT_ID }}
      VITE_TEST_COVERAGE: "${{ inputs.run-code-coverage-checks }}"
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build E2E dependencies
        run: pnpm run --filter="{./e2e-tests/*}..." --if-present build
      - name: Tar dist outputs
        run: |-
          find packages -type d -name dist -not -path "*/node_modules/*" -print0 \
            | tar --null -czf dist-outputs.tar.gz -T -
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: e2e-dist-outputs
          path: dist-outputs.tar.gz
          retention-days: 1
          if-no-files-found: error
  # Larger e2e suites (inputs, ui-components) are split into 2 shards across
  # separate runners; each shard runs Playwright with workers: "100%" so on an
  # 8-core ev-runner-large it uses ~8 worker processes per shard. Smaller
  # suites (browser, crypto-harness) run as a single job — setup overhead
  # would otherwise dominate. The install + build is done once in the `build`
  # job above and consumed here as an artifact.
  e2e-test:
    name: "Run E2E Tests for ${{ matrix.project }} (${{ matrix.shard }}/${{ matrix.total-shards }})"
    needs: [get-e2e-targets, build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.get-e2e-targets.outputs.e2e-test-matrix) }}
    timeout-minutes: 25
    runs-on: ev-runner-large
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    permissions:
      contents: write
      pull-requests: write
    env:
      EV_API_KEY: ${{ secrets.TESTS_DECRYPT_FN_KEY }}
      EV_APP_UUID: ${{ secrets.TESTS_APP_UUID }}
      EV_TEAM_UUID: ${{ secrets.TESTS_TEAM_UUID }}
      VITE_GOOGLE_PAY_MERCHANT_ID: ${{ vars.GOOGLE_PAY_MERCHANT_ID }}
      VITE_EV_APP_UUID: ${{ secrets.TESTS_APP_UUID }}
      VITE_EV_TEAM_UUID: ${{ secrets.TESTS_TEAM_UUID }}
      VITE_API_URL: ${{ inputs.vite-api-url }}
      VITE_EVERVAULT_JS_URL: ${{ inputs.vite-evervault-js-url }}
      VITE_KEYS_URL: ${{ inputs.vite-keys-url }}
      VITE_TEST_COVERAGE: "${{ inputs.run-code-coverage-checks }}"
      HOME: "/root"
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ssh-key: "${{ secrets.COMMIT_KEY }}"
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: e2e-dist-outputs
      - name: Extract dist outputs
        run: tar -xzf dist-outputs.tar.gz && rm dist-outputs.tar.gz
      - name: E2E test
        id: run-e2e-test
        if: ${{ inputs.update-screenshots == false }}
        run: pnpm run --filter="${{ matrix.project }}" --if-present e2e:test --shard=${{ matrix.shard }}/${{ matrix.total-shards }}
      - name: Update Screenshots
        if: ${{ inputs.update-screenshots == true }}
        run: pnpm run --filter="${{ matrix.project }}" --if-present e2e:test --shard=${{ matrix.shard }}/${{ matrix.total-shards }} --update-snapshots
      - name: Set up Git
        if: ${{ inputs.update-screenshots == true }}
        run: |
          git config --global user.email "e2e-tests@evervault.com"
          git config --global user.name "E2E Tests"
      - name: Commit and Push changes
        if: ${{ inputs.update-screenshots == true }}
        run: |
          git config --global --add safe.directory /__w/evervault-js/evervault-js
          git add -A
          git commit -m "[Screenshots] ${{ matrix.project }} (Shard ${{ matrix.shard }}/${{ matrix.total-shards }})" || echo "Nothing to commit"
          git push origin HEAD:${{ github.ref }} --no-verify
